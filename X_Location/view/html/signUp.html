<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>X_Location - SIGN UP</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../css/main.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='../css/standard.css'>
    <script src='../js/main.js'></script>
</head>
<body>
        <form>
            <div class="container_standard">
                
                <h1 class="logo">X_Location</h1>
                
                <div class="box_1_standard">
                    <h2 class="login_title">Create your account</h2>
                    <p class="login_subtitle">Start your journey with X_Location</p>
                    
                    <div class="input_group">
                        <input placeholder="Full Name" type="text">
                    </div>

                    <div class="input_group">
                        <input placeholder="Email" type="email">
                    </div>

                    <div class="input_group">
                        <input placeholder="Password" type="password">
                    </div>

                    <div class="input_group">
                        <input placeholder="Confirm Password" type="password">
                    </div>
                        
                    <button type="submit" formaction="signUp_Successfull.html">Create Account</button>
                        
                    <div class="box_2_standard">
                        <p class="signup_text">
                            Already have an account? <a href="index.html">Login</a>
                        </p>
                    </div>   
                </div>
                </div>
                
            </div>
        </form>
</body>
