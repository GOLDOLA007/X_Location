<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>X_Location - MAIN MENU</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src='main.js'></script>
</head>
<body>
        <form>
            <div class="container_MainMenu">
                <div class="box_1_MainMenu card">
                    <div class="box_1_1">
                        <button class="btn1_Insert_aRote" type="submit" formaction="index.html">
                            <i class="fas fa-arrow-right" style="transform: scaleX(-1);"></i>
                        </button>

                        
                    </div>

                    <input class="input_MainMenu" type="text" placeholder="Search a route...">

                    <div id="dynamicButtons"></div>

                    <div class="box_2_MainMenu">
                        <h1 class="h1_MainMenu" id="emptyMessage">
                            Oops... <br>Nothing to see here
                        </h1>
                    </div>

                    <div class="box_3_MainMenu">
                        
                        <div class="div_btn1">
                            <button class="btn1"> <i class="fa-solid fa-clock"></i> </button>
                        </div>
                        
                        
                        <div class="div_btn2">
                            <button class="btn2"> 
                                <i class="fas fa-arrow-right"></i>
                                <br>
                                <i class="fas fa-arrow-right" style="transform: scaleX(-1);"></i>
                            </button>
                        </div>
                        
                    </div>
                </div>
            </div>
        </form>
</body>
</html>

<script>

document.addEventListener("DOMContentLoaded", function(){

    new_addBtnInsert.reset_count();

    let count = new_addBtnInsert.get_count();

    let container = document.getElementById("dynamicButtons");
    let message = document.getElementById("emptyMessage");

    let addBtn = document.createElement("button");
    addBtn.className = "button_MainMenu";
    addBtn.type = "submit";
    addBtn.setAttribute("formaction", "insertRote_page.html");

    let addIcon = document.createElement("i");
    addIcon.className = "fa-solid fa-plus";

    addBtn.appendChild(addIcon);
    addBtn.append(" Add Route");

    container.appendChild(addBtn);

    if(count === 0){

        message.style.display = "block";

    }else{

        message.style.display = "none";

    }

    for(let i = 0; i < count; i++){

        let routeBtn = document.createElement("button");

        routeBtn.className = "button_MainMenu";
        routeBtn.type = "button";

        let icon = document.createElement("i");
        icon.className = "fa-solid fa-route";

        routeBtn.appendChild(icon);
        routeBtn.append(" Route " + (i+1));

        container.appendChild(routeBtn);

    }

});

</script>
