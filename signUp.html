<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>X_Location - SIGN UP</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='standard.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src='../js/main.js'></script>
</head>
<body>
        <form>
            <div class="container_standard">
                
                <h1 class="logo">X_Location</h1>
                
                <div class="box_1_standard">
                    <h2 class="login_title">Create your account</h2>
                    <p class="login_subtitle">Start your journey with X_Location</p>
                    
                    <div class="input_group">
                        <input placeholder="Full Name" type="text">
                    </div>

                    <div class="input_group">
                        <input placeholder="Email" type="email">
                    </div>

                    <div class="input_group password_group">
                        <input placeholder="Password" id="password" type="password">
                        <i class="fa-solid fa-eye toggle_icon" onclick="togglePassword()"></i>
                    </div>

                    <div class="input_group password_group">
                        <input placeholder="Confirm Password" type="password">
                    </div>

                        
                    <button type="submit" formaction="signUp_Successfull.html">Create Account</button>
                        
                    <div class="box_2_standard">
                        <p class="signup_text">
                            Already have an account? <a href="index.html">Login</a>
                        </p>
                    </div>   
                </div>
                </div>
                
            </div>
        </form>
</body>
</html>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".toggle_icon");

    const isHidden = password.type === "password";

    password.type = isHidden ? "text" : "password";

    icon.classList.toggle("fa-eye");
    icon.classList.toggle("fa-eye-slash");
}
</script>
